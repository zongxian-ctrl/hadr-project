# Morning sitrep — the unattended routine.
#
# Shape (ADR: the model never decides whether to wake up):
#   1. a deterministic script decides whether anything changed;
#   2. the report is rebuilt and committed ONLY if it did.
#
# Slice 2 fills step 1 (the change-detection gate) and, in place of the eventual
# headless-model call, rebuilds the page deterministically. The /sitrep model
# step replaces the "Rebuild" step in a later slice.
#
# The schedule is intentionally left COMMENTED. Enable it (uncomment the two
# lines) only after you have watched a manual run behave: commit on change, no
# commit on a quiet run. Until then, run it by hand from the Actions tab
# (workflow_dispatch).

name: Morning sitrep

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 0 * * *"  # 00:30 UTC = 08:30 Asia/Singapore (UTC+8, no DST)

# Never let two runs race on the commit-back.
concurrency:
  group: sitrep
  cancel-in-progress: false

# Required so the commit-back can push dashboard.html + state/ to the branch.
permissions:
  contents: write

jobs:
  sitrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 1 — the deterministic gate. Fetches GDACS once, decides whether the
      # reportable set changed, updates state on change, and saves the fetched
      # feed for the rebuild step so it doesn't fetch twice. Never calls a model.
      - id: check
        name: Detect change
        run: |
          python scripts/check_changes.py \
            --update \
            --snapshot-out "${{ runner.temp }}/feed.json"

      # Step 2 — rebuild the page, only on change, from the snapshot step 1 saved.
      # (Later slice: replace this with a headless `claude -p` /sitrep call.)
      - if: steps.check.outputs.changed == 'true'
        name: Rebuild dashboard
        run: |
          python scripts/build_dashboard.py --fixture "${{ runner.temp }}/feed.json"

      # Step 3 — commit dashboard.html + state/, only on change. The empty-diff
      # guard means even a spurious trigger cannot create an empty commit.
      - if: steps.check.outputs.changed == 'true'
        name: Commit updated report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.html state/seen-events.json
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "chore(sitrep): update report — $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
