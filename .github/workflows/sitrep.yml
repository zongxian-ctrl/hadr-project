# Morning sitrep — the unattended routine.
#
# Shape (ADR: the model never decides whether to wake up):
#   1. a deterministic gate decides whether anything changed and writes a
#      briefing.json (never calls a model);
#   2. only on change, the /sitrep model reads the briefing and writes the
#      report; then it is committed.
#
# The gate is deterministic and testable; the report is judgement, so it lives
# in a skill (skills/sitrep) run by the model. The model never decides whether
# to wake up — the gate does.

name: Morning sitrep

on:
  workflow_dispatch: {}
  # schedule DISABLED for now — the harness is being run and tested locally
  # (see scripts/run_local.py). Re-enable by uncommenting when ready.
  # schedule:
  #   - cron: "30 0 * * *"  # 00:30 UTC = 08:30 Asia/Singapore (UTC+8, no DST)

# Never let two runs race on the commit-back.
concurrency:
  group: sitrep
  cancel-in-progress: false

# contents: write so the commit-back can push dashboard.html + state/.
# id-token: write is used by claude-code-action for the model step.
permissions:
  contents: write
  id-token: write

jobs:
  sitrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 1 — the deterministic gate. Fetches GDACS once, decides whether the
      # reportable set changed, updates state on change, and writes briefing.json
      # (current reportable events + a corrections diff) for the model. Never
      # calls a model.
      - id: check
        name: Detect change
        run: |
          python scripts/check_changes.py \
            --update \
            --snapshot-out "${{ runner.temp }}/feed.json" \
            --briefing-out briefing.json

      # Step 2 — the /sitrep model, only on change. Reads briefing.json and
      # writes dashboard.html. Tools are restricted to Read/Write/Edit so the
      # model can only touch files (no git); the commit step below is the single
      # committer. If this step fails, the run fails loudly and nothing is
      # committed (see the empty-diff guard) — the intended "something's wrong"
      # signal.
      - if: steps.check.outputs.changed == 'true'
        name: Write sitrep (model)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read skills/sitrep/SKILL.md and follow it exactly: read briefing.json
            in the repo root and write the morning situation report to
            dashboard.html. Modify only dashboard.html. Do not commit or push.
          claude_args: '--allowedTools "Read,Write,Edit"'

      # Step 3 — commit dashboard.html + state/, only on change. The empty-diff
      # guard means even a spurious trigger cannot create an empty commit.
      - if: steps.check.outputs.changed == 'true'
        name: Commit updated report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.html state/seen-events.json
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "chore(sitrep): update report — $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
